{% extends "base.html" %}
{% block title %}New Alert — Resale Signal{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto fade-in">
    <div class="mb-6">
        <a href="{{ url_for('dashboard') }}" class="text-sm text-brand-600 hover:text-brand-700 font-medium">← Back to Dashboard</a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-6">Create New Alert</h1>

        <form method="POST" action="{{ url_for('create_alert') }}" class="space-y-5">

            <!-- Name -->
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Alert Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Cheap PS5"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                <p class="text-xs text-gray-400 mt-1">A friendly name for this alert.</p>
            </div>

            <!-- Region -->
            <div>
                <label for="region" class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                <input type="text" id="region" name="region" required placeholder="e.g. newyork, sfbay, losangeles"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                <p class="text-xs text-gray-400 mt-1">
                    Craigslist subdomain. Find yours at
                    <a href="https://www.craigslist.org/about/sites" target="_blank" rel="noopener" class="text-brand-600 hover:underline">craigslist.org/about/sites</a>.
                </p>
            </div>

            <!-- Category -->
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select id="category" name="category"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none bg-white">
                    <option value="sss" selected>All For Sale</option>
                    <option value="cta">Cars & Trucks</option>
                    <option value="mca">Motorcycles</option>
                    <option value="bik">Bicycles</option>
                    <option value="ele">Electronics</option>
                    <option value="fuo">Furniture</option>
                    <option value="clo">Clothing</option>
                    <option value="spo">Sporting Goods</option>
                    <option value="tls">Tools</option>
                    <option value="vgm">Video Gaming</option>
                </select>
            </div>

            <!-- Search Query -->
            <div>
                <label for="query" class="block text-sm font-medium text-gray-700 mb-1">Search Query</label>
                <input type="text" id="query" name="query" required placeholder="e.g. ps5, mountain bike, macbook"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
            </div>

            <!-- Price Range -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="min_price" class="block text-sm font-medium text-gray-700 mb-1">Min Price ($)</label>
                    <input type="number" id="min_price" name="min_price" min="0" placeholder="No min"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label for="max_price" class="block text-sm font-medium text-gray-700 mb-1">Max Price ($)</label>
                    <input type="number" id="max_price" name="max_price" min="0" placeholder="No max"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                </div>
            </div>

            <!-- Submit -->
            <div class="pt-2 flex items-center gap-3">
                <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2.5 rounded-lg font-medium text-sm transition">
                    Create Alert
                </button>
                <a href="{{ url_for('dashboard') }}" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
